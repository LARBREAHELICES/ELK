# Les agrégations Elasticsearch

### Query vs Aggregation

Une requête Elasticsearch peut faire deux choses différentes :

| Objectif               | Élément Elasticsearch |
| ---------------------- | --------------------- |
| Trouver des documents  | query                 |
| Analyser des documents | aggs                  |

Donc :

```json
GET index/_search
{
  "query": { ... },
  "aggs": { ... }
}
```

* `query` → sélectionne les documents
* `aggs` → calcule sur ces documents

---

## Remarque importante

Pour les agrégations sur des champs textuels, il faut utiliser **`.keyword`** et pas le champ `text`.

Pourquoi ?

- `text` = analysé → pas utilisable pour GROUP BY
- `keyword` = valeur exacte → utilisable pour GROUP BY

```json
"terms": {
  "field": "speaker.keyword"
}
```

| Champ   | Usage                     |
| ------- | ------------------------- |
| text    | recherche                 |
| keyword | agrégation / tri / filtre |

**Règle :**
- Recherche → `text`
- Agrégation → `keyword`

---

### Première agrégation : regrouper avec `terms`

On veut compter le nombre de documents par pièce.

```json
GET shakespeare/_search
{
  "size": 0,
  "aggs": {
    "par_piece": {
      "terms": {
        "field": "play_name.keyword"
      }
    }
  }
}
```

Résultat :

| play_name | count |
| --------- | ----- |
| Hamlet    | 3     |
| Othello   | 2     |
| Macbeth   | 2     |

`terms` = regrouper par valeur.

Équivalent SQL :

```sql
SELECT play_name, COUNT(*)
FROM shakespeare
GROUP BY play_name;
```

---

### Agrégations numériques

Si on a un champ `year`, on peut faire des calculs :

| Calcul       | Agrégation |
| ------------ | ---------- |
| moyenne      | avg        |
| minimum      | min        |
| maximum      | max        |
| somme        | sum        |
| statistiques | stats      |

Exemple :

```json
GET shakespeare/_search
{
  "size": 0,
  "aggs": {
    "moyenne_annee": {
      "avg": {
        "field": "year"
      }
    }
  }
}
```

`size:0` indique que l'on ne souhaite pas les documents dans la recherche, seulement les statistiques.

---

### Agrégation avec filtre

On peut filtrer les documents avant de faire le calcul :

```json
GET shakespeare/_search
{
  "query": {
    "range": {
      "year": {
        "gte": 1600,
        "lte": 1610
      }
    }
  },
  "size": 0,
  "aggs": {
    "par_piece": {
      "terms": {
        "field": "play_name.keyword"
      }
    }
  }
}
```

On analyse seulement les documents entre 1600 et 1610.

---

### Agrégations imbriquées (GROUP BY + calcul)

On veut la moyenne des années par pièce.

```json
GET shakespeare/_search
{
  "size": 0,
  "aggs": {
    "par_piece": {
      "terms": {
        "field": "play_name.keyword"
      },
      "aggs": {
        "moyenne_annee": {
          "avg": {
            "field": "year"
          }
        }
      }
    }
  }
}
```

SQL :

```sql
SELECT play_name, AVG(year)
FROM shakespeare
GROUP BY play_name;
```

---

### Agrégation par intervalle

On veut regrouper par périodes.

```json
GET shakespeare/_search
{
  "size": 0,
  "aggs": {
    "par_periode": {
      "range": {
        "field": "year",
        "ranges": [
          { "to": 1600 },
          { "from": 1600, "to": 1605 },
          { "from": 1605 }
        ]
      }
    }
  }
}
```

Cela crée des groupes par intervalle de valeurs.

## Agrégation `histogram`

L'agrégation `histogram` permet de regrouper des valeurs numériques dans des intervalles de taille fixe.

```json
GET shakespeare/_search
{
  "size": 0,
  "aggs": {
    "par_periode": {
      "histogram": {
        "field": "year",
        "interval": 5
      }
    }
  }
}
```

Si `interval = 5`, Elasticsearch crée des groupes :

* 1600–1605
* 1605–1610
* 1610–1615

### Différence avec `range`

| histogram         | range                         |
| ----------------- | ----------------------------- |
| intervalles fixes | intervalles définis à la main |

---

## Agrégation `date_histogram`

`date_histogram` permet de regrouper des documents par intervalle de temps (jour, mois, année).

### Exemple

```json
GET shakespeare/_search
{
  "size": 0,
  "aggs": {
    "par_annee": {
      "date_histogram": {
        "field": "date",
        "calendar_interval": "year"
      }
    }
  }
}
```

### Intervalles possibles

| Intervalle | Signification |
| ---------- | ------------- |
| minute     | par minute    |
| hour       | par heure     |
| day        | par jour      |
| month      | par mois      |
| year       | par année     |

---
