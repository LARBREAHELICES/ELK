# Les agrégations Elasticsearch

### Query vs Aggregation

Une requête Elasticsearch peut faire deux choses différentes :

| Objectif               | Élément Elasticsearch |
| ---------------------- | --------------------- |
| Trouver des documents  | query                 |
| Analyser des documents | aggs                  |

Donc :

```json
GET index/_search
{
  "query": { ... },
  "aggs": { ... }
}
```

* `query` → sélectionne les documents
* `aggs` → calcule sur ces documents

---

## Remarque importante

Pour les agrégations sur des champs textuels, il faut utiliser **`.keyword`** et pas le champ `text`.

Pourquoi ?

- `text` = analysé → pas utilisable pour GROUP BY
- `keyword` = valeur exacte → utilisable pour GROUP BY

```json
"terms": {
  "field": "speaker.keyword"
}
```

| Champ   | Usage                     |
| ------- | ------------------------- |
| text    | recherche                 |
| keyword | agrégation / tri / filtre |

**Règle :**
- Recherche → `text`
- Agrégation → `keyword`

---

### Première agrégation : regrouper avec `terms`

On veut compter le nombre de documents par pièce.

```json
GET shakespeare/_search
{
  "size": 0,
  "aggs": {
    "par_piece": {
      "terms": {
        "field": "play_name.keyword"
      }
    }
  }
}
```

Résultat :

| play_name | count |
| --------- | ----- |
| Hamlet    | 3     |
| Othello   | 2     |
| Macbeth   | 2     |

`terms` = regrouper par valeur.

Équivalent SQL :

```sql
SELECT play_name, COUNT(*)
FROM shakespeare
GROUP BY play_name;
```

---

### Agrégations numériques

Si on a un champ `year`, on peut faire des calculs :

| Calcul       | Agrégation |
| ------------ | ---------- |
| moyenne      | avg        |
| minimum      | min        |
| maximum      | max        |
| somme        | sum        |
| statistiques | stats      |

Exemple :

```json
GET shakespeare/_search
{
  "size": 0,
  "aggs": {
    "moyenne_annee": {
      "avg": {
        "field": "year"
      }
    }
  }
}
```

`size:0` indique que l'on ne souhaite pas les documents dans la recherche, seulement les statistiques.

---

### Agrégation avec filtre

On peut filtrer les documents avant de faire le calcul :

```json
GET shakespeare/_search
{
  "query": {
    "range": {
      "year": {
        "gte": 1600,
        "lte": 1610
      }
    }
  },
  "size": 0,
  "aggs": {
    "par_piece": {
      "terms": {
        "field": "play_name.keyword"
      }
    }
  }
}
```

On analyse seulement les documents entre 1600 et 1610.

---

### Agrégations imbriquées (GROUP BY + calcul)

On veut la moyenne des années par pièce.

```json
GET shakespeare/_search
{
  "size": 0,
  "aggs": {
    "par_piece": {
      "terms": {
        "field": "play_name.keyword"
      },
      "aggs": {
        "moyenne_annee": {
          "avg": {
            "field": "year"
          }
        }
      }
    }
  }
}
```

SQL :

```sql
SELECT play_name, AVG(year)
FROM shakespeare
GROUP BY play_name;
```

---

### Agrégation par intervalle

On veut regrouper par périodes.

```json
GET shakespeare/_search
{
  "size": 0,
  "aggs": {
    "par_periode": {
      "range": {
        "field": "year",
        "ranges": [
          { "to": 1600 },
          { "from": 1600, "to": 1605 },
          { "from": 1605 }
        ]
      }
    }
  }
}
```

Cela crée des groupes par intervalle de valeurs.

---

## Agrégation `histogram`

L'agrégation `histogram` permet de regrouper des valeurs numériques dans des intervalles de taille fixe.

```json
GET shakespeare/_search
{
  "size": 0,
  "aggs": {
    "par_periode": {
      "histogram": {
        "field": "year",
        "interval": 5
      }
    }
  }
}
```

Si `interval = 5`, Elasticsearch crée des groupes :

* 1600–1605
* 1605–1610
* 1610–1615

### Différence avec `range`

| histogram         | range                         |
| ----------------- | ----------------------------- |
| intervalles fixes | intervalles définis à la main |

---

## Agrégation `date_histogram`

`date_histogram` permet de regrouper des documents par intervalle de temps (jour, mois, année).

### Exemple

```json
GET shakespeare/_search
{
  "size": 0,
  "aggs": {
    "par_annee": {
      "date_histogram": {
        "field": "date",
        "calendar_interval": "year"
      }
    }
  }
}
```

### Intervalles possibles

| Intervalle | Signification |
| ---------- | ------------- |
| minute     | par minute    |
| hour       | par heure     |
| day        | par jour      |
| month      | par mois      |
| year       | par année     |

---

# Partie avancée — `emit` dans Elasticsearch

## Note de synthèse — Agrégations et runtime fields

Les agrégations et les runtime fields sont très puissants, mais ils peuvent être coûteux en calcul.

En particulier :

- les agrégations s'exécutent sur beaucoup de documents
- les scripts (`runtime`, `emit`) consomment du CPU
- cela peut devenir lent sur de gros volumes de données

Règle pratique :

- pour explorer / tester → runtime fields + `emit`
- pour la production → créer un vrai champ indexé
- éviter les scripts sur des millions de documents
- toujours tester avec `size: 0` pour ne pas récupérer les documents inutilement

**Idée clé :**
Ce qui est pratique n'est pas toujours performant.

---

`emit` est utilisé dans les **runtime fields** ou les **scripted aggregations** pour **émettre une valeur calculée** qu'Elasticsearch pourra ensuite agréger.

En gros :

> `emit()` permet de créer une valeur calculée à la volée.

---

## Runtime field avec `emit`

On peut créer un champ calculé sans modifier l'index.

Exemple : calculer la longueur d'une réplique.

```json
GET shakespeare/_search
{
  "size": 0,
  "runtime_mappings": {
    "line_length": {
      "type": "long",
      "script": {
        "source": "emit(doc['text_entry.keyword'].value.length())"
      }
    }
  },
  "aggs": {
    "longueur_moyenne": {
      "avg": {
        "field": "line_length"
      }
    }
  }
}
```

### Ce que fait `emit`

```js
emit(valeur)
```

→ envoie la valeur dans le champ calculé.

Sans `emit`, Elasticsearch ne peut pas récupérer la valeur.

---

## Exemple : année regroupée par décennie

On veut regrouper par décennie (1600, 1610, etc.).

```json
GET shakespeare/_search
{
  "size": 0,
  "runtime_mappings": {
    "decade": {
      "type": "long",
      "script": {
        "source": "emit((doc['year'].value / 10) * 10)"
      }
    }
  },
  "aggs": {
    "par_decennie": {
      "terms": {
        "field": "decade"
      }
    }
  }
}
```

SQL équivalent :

```sql
SELECT FLOOR(year/10)*10 AS decade, COUNT(*)
FROM shakespeare
GROUP BY decade;
```

---

## Exemple : catégoriser des valeurs - Painless

Le langage utilisé est Painless, propre à Elasticsearch.

On veut créer des catégories :

* court
* moyen
* long

```json
GET shakespeare/_search
{
  "size": 0,
  "runtime_mappings": {
    "categorie_longueur": {
      "type": "keyword",
      "script": {
        "source": """
          int len = doc['text_entry.keyword'].value.length();
          if (len < 50) emit("court");
          else if (len < 100) emit("moyen");
          else emit("long");
        """
      }
    }
  },
  "aggs": {
    "par_categorie": {
      "terms": {
        "field": "categorie_longueur"
      }
    }
  }
}
```

Très puissant : on peut faire un **GROUP BY sur une valeur calculée**.

---

## Cas réel très important (logs)

Exemple : extraire le domaine d'une URL.

```json
"script": {
  "source": """
    String url = doc['url.keyword'].value;
    if (url.contains("google")) emit("google");
    else if (url.contains("bing")) emit("bing");
    else emit("autre");
  """
}
```

Puis agrégation dessus → analytics.

---

## Quand utiliser `emit` ?

Quand on veut faire un GROUP BY sur :

* une transformation
* une catégorie
* une tranche
* une valeur calculée
* un parsing (URL, email, log…)
* une normalisation
* une règle métier

Donc :

> `emit` = SQL `CASE WHEN` + `GROUP BY`
