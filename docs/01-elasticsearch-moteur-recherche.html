# Cours 1 - Elasticsearch Introduction
## Comprendre ce que fait chaque requete

---

## Elasticsearch, c est quoi concretement

- <span class="glossary-term" data-definition="Moteur distribue de recherche et d'analyse qui indexe des donnees pour repondre vite a des requetes texte et structurees.">Elasticsearch</span> est un moteur de recherche et d analytics distribue
- Il stocke des <span class="glossary-term" data-definition="Objet JSON unitaire stocke dans un index Elasticsearch.">documents JSON</span> dans des <span class="glossary-term" data-definition="Collection logique de documents partageant un meme schema general.">index</span>
- Il expose une <span class="glossary-term" data-definition="Interface HTTP qui permet d'interroger le moteur avec des requetes JSON.">API REST</span> pour indexer, chercher, filtrer et aggreger
- Il est optimise pour la recherche <span class="glossary-term" data-definition="Recherche dans du langage naturel avec analyse du texte et classement par pertinence.">full-text</span> et les analytics quasi temps reel

---

## Base documentaire ou moteur de recherche

- Oui, Elasticsearch stocke des documents JSON
- Non, son objectif principal n est pas de remplacer une base transactionnelle relationnelle
- Sa force principale: recherche pertinente, filtres rapides, aggregations et classement par score
- Bon modele mental: base orientee recherche plutot que base orientee transactions

---

## Repere historique rapide

- 2010: premiere version publique d Elasticsearch
- 2012: creation d Elastic autour de l ecosysteme Elasticsearch
- Aujourd hui: stack ELK tres utilisee pour search applicatif, observabilite et analyse de logs

---

## Pourquoi les entreprises l utilisent aujourd hui

- Moteur de recherche produit (e commerce, catalogues, FAQ)
- Observabilite (logs, traces, metriques) avec dashboards Kibana
- Investigation securite (detection, correlation, analyse d evenements)
- Recherche transverse dans des donnees heterogenes via une API unique

---

## Exemple metier concret

Cas support client:

- On indexe chaque ticket en document JSON (`titre`, `description`, `priorite`, `service`, `date`)
- On cherche en full-text (`match` sur la description)
- On filtre par contrainte metier (`term` sur service, `range` sur date)
- On priorise les resultats par pertinence (`_score`) et urgence metier

---

## Objectif du cours

- Creer un index avec un mapping explicite
- Inserer des donnees de demo reutilisables
- Lire et expliquer le comportement des requetes
- Comprendre les particularites moteur (analyse, score, filter context)

---


## Reperes theoriques indispensables (moteur)

- Elasticsearch est un moteur de recherche distribue base sur <span class="glossary-term" data-definition="Bibliotheque de recherche plein texte utilisee comme coeur d'Elasticsearch.">Lucene</span>
- Les documents JSON sont indexes dans un index inverse (terme -> ids de documents)
- Le full-text passe par un pipeline d'analyse: tokenizer + filtres
- Le score de pertinence est base sur <span class="glossary-term" data-definition="Algorithme de ranking par defaut qui estime la pertinence d'un document pour une requete.">BM25</span>
- `query` context calcule un score, `filter` context ne score pas et peut etre mis en cache
- Le moteur est near-real-time: les docs deviennent visibles apres refresh

---

## Pourquoi l index inverse est le coeur d Elasticsearch

Dans une base classique, on parcourt souvent les lignes pour trouver une valeur.

Dans Elasticsearch, on construit plutot une structure:

- terme -> liste des documents qui contiennent ce terme

Cette structure s appelle l index inverse.

---

## Exemple concret (3 documents)

Document `1`:

- `text_entry`: "to be or not to be"

Document `2`:

- `text_entry`: "be brave and bold"

Document `3`:

- `text_entry`: "not today"

---

## A quoi ressemble l index inverse

Representation simplifiee:

- `to` -> [1]
- `be` -> [1, 2]
- `or` -> [1]
- `not` -> [1, 3]
- `brave` -> [2]
- `bold` -> [2]
- `today` -> [3]

Idee cle:

- Elasticsearch ne cherche pas d abord dans les documents
- il cherche d abord dans la table des termes

---

## Ce qui se passe pendant une requete `match`

Requete:

```json
{
  "query": { "match": { "text_entry": "be not" } }
}
```

Execution simplifiee:

- la requete est analysee en tokens (`be`, `not`)
- Elasticsearch lit rapidement les postings de l index inverse
- il combine les listes de documents
- il calcule un score de pertinence (`_score`)

---

## Pourquoi c est important pour la suite du cours

- `text` + `match`: logique linguistique via index inverse
- `keyword` + `term`: logique exacte via valeur brute
- Un bon mapping decide comment chaque champ sera indexe
- Donc la qualite de recherche depend d abord de l indexation, ensuite de la requete

---

## Creer l'index et son schema

```bash
curl -X PUT "http://localhost:9200/catalogue_demo" -H "Content-Type: application/json" -d '{
  "settings": {
    "number_of_shards": 1,
    "number_of_replicas": 0
  },
  "mappings": {
    "properties": {
      "title":       { "type": "text" },
      "description": { "type": "text" },
      "brand":       { "type": "keyword" },
      "category":    { "type": "keyword" },
      "price":       { "type": "float" },
      "in_stock":    { "type": "boolean" }
    }
  }
}'
```

Ce que fait le code:
- Cree un index `catalogue_demo`
- Definit les types de champs (important pour requetes et performance)
- `text` sert a la recherche linguistique
- `keyword` sert au filtrage exact et aux aggregations

---

## Bulk API et NDJSON, c est quoi exactement

`_bulk` permet d envoyer plusieurs operations en une seule requete HTTP.

Le corps n est pas un JSON unique.
C est du NDJSON (Newline Delimited JSON):

- 1 ligne JSON pour l action (`index`, `create`, `update`, `delete`)
- 1 ligne JSON pour la source du document (sauf `delete`)
- puis on recommence pour chaque document

---

## Structure minimale attendue par `_bulk`

```ndjson
{"index":{"_index":"catalogue_demo","_id":"1"}}
{"title":"Casque audio bluetooth","brand":"Acme"}
{"index":{"_index":"catalogue_demo","_id":"2"}}
{"title":"Ecouteurs sport","brand":"Acme"}
```

Points obligatoires:

- header `Content-Type: application/x-ndjson`
- un retour a la ligne entre chaque objet
- une fin de fichier terminee par newline

---

## Pourquoi utiliser Bulk en pratique

- beaucoup plus rapide que 1 requete HTTP par document
- moins de surcharge reseau
- format standard pour charger un dataset de cours ou de preproduction

Erreurs frequentes:

- envoyer un tableau JSON `[{...},{...}]` au lieu de NDJSON
- oublier la ligne d action avant un document
- utiliser `application/json` au lieu de `application/x-ndjson`

---

## Inserer des donnees d'exemple (bulk NDJSON)

```bash
curl -X POST "http://localhost:9200/catalogue_demo/_bulk" -H "Content-Type: application/x-ndjson" -d '
{"index":{"_id":"1"}}
{"title":"Casque audio bluetooth","description":"Casque sans fil reduction de bruit","brand":"Acme","category":"audio","price":99.9,"in_stock":true}
{"index":{"_id":"2"}}
{"title":"Ecouteurs sport","description":"Ecouteurs bluetooth etanche","brand":"Acme","category":"audio","price":59.0,"in_stock":true}
{"index":{"_id":"3"}}
{"title":"Clavier mecanique","description":"Clavier gaming switch rouge","brand":"KeyPro","category":"informatique","price":129.0,"in_stock":false}
'
```

```bash
curl -X POST "http://localhost:9200/catalogue_demo/_refresh"
curl "http://localhost:9200/catalogue_demo/_count?pretty"
```

Ce que fait le code:
- Envoie 3 documents via `_bulk` (format NDJSON)
- Force un refresh pour rendre les docs visibles tout de suite
- Verifie le nombre de documents indexes

---

## Recherche plein texte: ce que cela veut dire

Une recherche plein texte ne cherche pas une chaine exacte caractere par caractere.

Elle cherche des termes et leur pertinence dans du langage naturel.

Exemple intention utilisateur:

- "casque bluetooth"
- "casque sans fil"
- "bluetooth filaire" (requete imparfaite)

Le moteur doit quand meme retrouver les documents les plus proches de l intention.

---

## Comment Elasticsearch traite une recherche plein texte

Pipeline simplifie:

- analyser le texte indexe (au moment de l indexation)
- analyser la requete utilisateur (au moment de la recherche)
- comparer les tokens dans l index inverse
- classer les hits par `_score`

Donc la recherche plein texte depend a la fois:

- du mapping (`text`)
- de l analyse linguistique
- de la requete (`match`, `multi_match`, etc.)

---

## Voir concretement les tokens avec `_analyze`

```bash
curl -X GET "http://localhost:9200/catalogue_demo/_analyze?pretty" -H "Content-Type: application/json" -d '{
  "field": "description",
  "text": "Casque sans fil bluetooth"
}'
```

Ce test montre la representation interne du texte en tokens.
Ces tokens sont la base reelle du matching full-text.

---

## Plein texte vs recherche exacte

- plein texte: champ `text` + requete `match`
- recherche exacte: champ `keyword` + requete `term`

Regle pratique:

- si vous cherchez une idee dans une phrase -> `match`
- si vous cherchez une valeur exacte (marque, code, statut) -> `term`

---

## Recherche full-text avec `match`: pas a pas

Requete de base:

```bash
curl -X GET "http://localhost:9200/catalogue_demo/_search?pretty" -H "Content-Type: application/json" -d '{
  "query": { "match": { "description": "bluetooth sans fil" } }
}'
```

---

## Ce que fait `match` en interne

`match` ne compare pas une phrase brute.
Le moteur suit ce pipeline:

- il analyse la requete (`bluetooth`, `sans`, `fil`)
- il lit l index inverse du champ `description`
- il retrouve les documents qui contiennent ces termes
- il calcule un `_score` de pertinence (BM25)

Conclusion:

- `match` = recherche linguistique, pas egalite stricte

---

## Resultat attendu sur nos 3 documents

Avec les donnees de demo:

- doc 1 (`Casque sans fil reduction de bruit`) matche fort
- doc 2 (`Ecouteurs bluetooth etanche`) peut matcher partiellement
- doc 3 (clavier gaming) ne match pas

Pourquoi:

- par defaut, `match` utilise une logique OR (au moins un terme)
- plus il y a de termes utiles, plus le score monte

---

## Notion de score (`_score`): comment l interpreter

`_score` represente la pertinence estimee d un document pour la requete courante.

Important:

- ce n est pas un pourcentage
- ce n est pas une note metier absolue
- c est surtout une valeur relative pour trier les hits d une meme requete

---

## Pourquoi un document a un meilleur `_score`

BM25 favorise en general:

- un document qui contient plus de termes de la requete
- des termes plus discriminants dans le corpus
- une bonne densite de termes utiles dans le champ

Exemple d interpretation:

- doc A: `_score = 2.9` (deux termes tres pertinents)
- doc B: `_score = 1.4` (un seul terme faible)

Ici A est classe avant B pour cette requete, sur cet index.

---

## Rendre la recherche plus stricte

Option 1: tous les termes doivent etre presents (`operator: and`)

```json
GET catalogue_demo/_search
{
  "query": {
    "match": {
      "description": {
        "query": "bluetooth sans fil",
        "operator": "and"
      }
    }
  }
}
```

Option 2: compromis avec `minimum_should_match`

```json
GET catalogue_demo/_search
{
  "query": {
    "match": {
      "description": {
        "query": "bluetooth sans fil",
        "minimum_should_match": "2"
      }
    }
  }
}
```

---

## Comment lire la reponse `match`

- `hits.total.value`: combien de documents correspondent
- `hits.hits[*]._score`: ordre de pertinence
- `hits.hits[*]._source.description`: texte qui a vraiment matche

Reflexe de debug:

- si trop de bruit, rendre la requete plus stricte (`operator`, `minimum_should_match`)
- si zero resultat, verifier l analyseur et le contenu reel du champ

---

## Filtrage exact avec `term`

```bash
curl -X GET "http://localhost:9200/catalogue_demo/_search?pretty" -H "Content-Type: application/json" -d '{
  "query": { "term": { "brand": "Acme" } }
}'
```

Ce que fait le code:
- Filtre les docs dont `brand` vaut exactement `Acme`
- Fonctionne car `brand` est de type `keyword`

Repere theorique:
- `term` sur un champ `text` donne souvent des surprises
- Pour un filtre exact, utiliser un champ `keyword`

---

## Combiner texte + contraintes metier (`bool`)

```bash
curl -X GET "http://localhost:9200/catalogue_demo/_search?pretty" -H "Content-Type: application/json" -d '{
  "query": {
    "bool": {
      "must": [
        { "match": { "description": "bluetooth" } }
      ],
      "filter": [
        { "term": { "in_stock": true } },
        { "range": { "price": { "lte": 120 } } }
      ]
    }
  }
}'
```

Ce que fait le code:
- `must`: partie full-text qui influence `_score`
- `filter`: contraintes booleennes et numeriques sans impact sur le score
- Renvoie des resultats pertinents et filtrables en production

---

## Piloter la pertinence (boost de champ)

```bash
curl -X GET "http://localhost:9200/catalogue_demo/_search?pretty" -H "Content-Type: application/json" -d '{
  "query": {
    "multi_match": {
      "query": "bluetooth",
      "fields": ["title^3", "description"]
    }
  }
}'
```

Ce que fait le code:
- Cherche le terme sur plusieurs champs
- Donne 3x plus de poids a `title` qu'a `description`

Repere theorique:
- `_score` sert a ordonner des resultats relatifs a une requete
- Le boost est un levier metier pour controler le ranking

---

## Tolerance aux fautes (`fuzziness`)

```bash
curl -X GET "http://localhost:9200/catalogue_demo/_search?pretty" -H "Content-Type: application/json" -d '{
  "query": {
    "match": {
      "title": {
        "query": "bluetoth",
        "fuzziness": "AUTO"
      }
    }
  }
}'
```

Ce que fait le code:
- Accepte des variations orthographiques proches
- Utile pour barre de recherche utilisateur

Repere theorique:
- `fuzziness` s'appuie sur la distance d'edition (Levenshtein)
- A utiliser avec controle (precision/performance)

---

## Facettes et stats avec aggregations

```bash
curl -X GET "http://localhost:9200/catalogue_demo/_search?pretty" -H "Content-Type: application/json" -d '{
  "size": 0,
  "aggs": {
    "brands":    { "terms": { "field": "brand" } },
    "avg_price": { "avg":   { "field": "price" } }
  }
}'
```

Ce que fait le code:
- `size: 0` ignore les hits, renvoie uniquement les agregations
- `terms` construit une facette par marque
- `avg` calcule une metrique (prix moyen)

Repere theorique:
- Les aggregations s'appuient surtout sur des champs `keyword` ou numeriques
- Elles servent a construire filtres UI, dashboards, analytics

---

## Lecture de reponse: quoi regarder en premier

- `hits.total.value`: volume total de resultats
- `hits.hits[*]._source`: documents retournes
- `hits.hits[*]._score`: ordre de pertinence
- `aggregations`: donnees de facettes/statistiques
- `took`: temps d'execution cote moteur (ms)
