# Les requêtes Elasticsearch

## Structure d'une requête

Dans Elasticsearch, toutes les recherches se font avec `_search`.

Structure générale :

```json
GET shakespeare/_search
{
  "query": {
    ...
  }
}
```

Une requête Elasticsearch est toujours une structure JSON placée dans `query`.

---

# match vs term

Il existe deux types de recherche principaux :

| Requête | Utilisation             |
| ------- | ----------------------- |
| match   | recherche dans un texte |
| term    | recherche exacte        |

---

## Important — `text` vs `keyword`

Quand Elasticsearch crée le mapping automatiquement pour un champ texte, il crée souvent deux champs :

| Champ           | Type    | Utilisation            |
| --------------- | ------- | ---------------------- |
| speaker         | text    | recherche texte        |
| speaker.keyword | keyword | filtre / valeur exacte |

Donc :

| Si on veut                 | Requête                  |
| -------------------------- | ------------------------ |
| chercher dans un texte     | match                    |
| chercher une valeur exacte | term                     |
| filtrer `speaker`          | term sur `speaker.keyword` |

Règle à retenir :

```text
text → match
keyword → term
```

---

# Exemple match

```json
GET shakespeare/_search
{
  "query": {
    "match": {
      "text_entry": "question"
    }
  }
}
```

Ce que fait Elasticsearch :

1. Elasticsearch reçoit "question"
2. Il analyse le mot (analyzer)
3. Il obtient un token
4. Il cherche ce token dans l’index inversé
5. Il trouve les documents
6. Il calcule un score
7. Il renvoie les résultats

---

# Exemple term

```json
GET shakespeare/_search
{
  "query": {
    "term": {
      "speaker.keyword": "HAMLET"
    }
  }
}
```

Ici Elasticsearch cherche exactement la valeur **HAMLET**.

Si on ne veut pas dépendre de la casse :

```json
"term": {
  "speaker.keyword": {
    "value": "hamlet",
    "case_insensitive": true
  }
}
```

---

# La requête bool

Structure :

```json
{
  "query": {
    "bool": {
      "must": [],
      "filter": [],
      "should": [],
      "must_not": []
    }
  }
}
```

| Élément  | Rôle                                          |
| -------- | --------------------------------------------- |
| must     | condition obligatoire + score                 |
| filter   | condition obligatoire sans score              |
| should   | améliore le score ou peut devenir obligatoire |
| must_not | exclut des documents                          |

La requête bool permet de combiner plusieurs conditions.

---

# must

Exemple :

> On veut les phrases contenant "be" prononcées par Hamlet.

```json
GET shakespeare/_search
{
  "query": {
    "bool": {
      "must": [
        { "match": { "text_entry": "be" } },
        { "term": { "speaker.keyword": "HAMLET" } }
      ]
    }
  }
}
```

Traduction logique :

```text
text contient "be"
AND speaker = HAMLET
```

---

# should

Exemple :

> On veut les phrases prononcées par Hamlet ou Othello.

```json
GET shakespeare/_search
{
  "query": {
    "bool": {
      "should": [
        { "term": { "speaker.keyword": "HAMLET" } },
        { "term": { "speaker.keyword": "OTHELLO" } }
      ],
      "minimum_should_match": 1
    }
  }
}
```

Traduction :

```text
speaker = HAMLET
OR speaker = OTHELLO
```

`minimum_should_match` indique combien de conditions doivent être vraies.

| Valeur | Signification                |
| ------ | ---------------------------- |
| 0      | optionnel, améliore le score |
| 1      | au moins une condition       |
| 2      | deux conditions obligatoires |

---

Exemple avec score :

```json
{
  "query": {
    "bool": {
      "must": [
        { "match": { "text_entry": "love" } }
      ],
      "should": [
        { "term": { "speaker.keyword": "HAMLET" } },
        { "term": { "speaker.keyword": "OTHELLO" } }
      ],
      "minimum_should_match": 0
    }
  }
}
```

Traduction :

```text
text contient "love"
ET
si speaker = HAMLET ou OTHELLO → meilleur score
```

---

# must_not

Exemple :

> On veut tous les textes sauf ceux de Macbeth.

```json
GET shakespeare/_search
{
  "query": {
    "bool": {
      "must_not": [
        { "term": { "play_name.keyword": "Macbeth" } }
      ]
    }
  }
}
```

Traduction :

```text
NOT play_name = Macbeth
```

---

# filter

Exemple :

> On veut les textes contenant "be" mais seulement Hamlet.

```json
GET shakespeare/_search
{
  "query": {
    "bool": {
      "must": [
        { "match": { "text_entry": "be" } }
      ],
      "filter": [
        { "term": { "play_name.keyword": "Hamlet" } }
      ]
    }
  }
}
```

Important :

* `must` influence le score
* `filter` filtre uniquement

---

# AND

`be AND not`

```json
GET shakespeare/_search
{
  "query": {
    "bool": {
      "must": [
        { "match": { "text_entry": "be" } },
        { "match": { "text_entry": "not" } }
      ]
    }
  }
}
```

---

# OR

`be OR not`

```json
GET shakespeare/_search
{
  "query": {
    "bool": {
      "should": [
        { "match": { "text_entry": "be" } },
        { "match": { "text_entry": "not" } }
      ],
      "minimum_should_match": 1
    }
  }
}
```

---

# AND + OR

Exemple :

> On veut les textes contenant "love" et prononcés par Hamlet ou Othello.

```json
GET shakespeare/_search
{
  "query": {
    "bool": {
      "must": [
        { "match": { "text_entry": "love" } }
      ],
      "should": [
        { "term": { "speaker.keyword": "HAMLET" } },
        { "term": { "speaker.keyword": "OTHELLO" } }
      ],
      "minimum_should_match": 1
    }
  }
}
```

Traduction :

```text
text contient "love"
AND
(HAMLET OR OTHELLO)
```

---

# Requêtes imbriquées

On veut :

```txt
(text contient "love" OU text contient "death")
ET
(HAMLET OU OTHELLO)
```

```json
GET shakespeare/_search
{
  "query": {
    "bool": {
      "must": [
        {
          "bool": {
            "should": [
              { "match": { "text_entry": "love" } },
              { "match": { "text_entry": "death" } }
            ],
            "minimum_should_match": 1
          }
        },
        {
          "bool": {
            "should": [
              { "term": { "speaker.keyword": "HAMLET" } },
              { "term": { "speaker.keyword": "OTHELLO" } }
            ],
            "minimum_should_match": 1
          }
        }
      ]
    }
  }
}
```

---

# Requête range

Si on a un champ `year` :

```json
GET shakespeare/_search
{
  "query": {
    "range": {
      "year": {
        "gte": 1600,
        "lte": 1700
      }
    }
  }
}
```

| Opérateur | Signification |
| --------- | ------------- |
| gte       | >=            |
| lte       | <=            |
| gt        | >             |
| lt        | <             |

---

# Correspondance SQL

| SQL     | Elasticsearch |
| ------- | ------------- |
| AND     | must          |
| OR      | should        |
| NOT     | must_not      |
| WHERE   | filter        |
| LIKE    | match         |
| =       | term          |
| BETWEEN | range         |

---

# Comment Elasticsearch traite une requête

Elasticsearch traite une requête en trois étapes :

```text
1. must → chercher
2. filter → filtrer
3. should → classer
4. tri par score
```

---

# Schéma global

```text
Recherche (must)
        ↓
Filtre (filter)
        ↓
Classement (should)
        ↓
Résultats
```

# Multi Match — Shakespeare

## Principe

On veut chercher un mot ou une phrase dans plusieurs champs :

* `speaker`
* `play_name`
* `text_entry`

```json
GET shakespeare/_search
{
  "query": {
    "multi_match": {
      "query": "king",
      "fields": ["text_entry", "play_name", "speaker"]
    }
  }
}
```

---

# Pondération des champs

Certains champs sont plus importants :

* `play_name` → très important
* `speaker` → important
* `text_entry` → normal

```json
GET shakespeare/_search
{
  "query": {
    "multi_match": {
      "query": "king",
      "fields": ["play_name^3", "speaker^2", "text_entry"]
    }
  }
}
```

Si "king" est dans le **titre de la pièce**, le score sera plus élevé.

---

# Avec filtre (pièce précise)

On veut chercher **"love"** seulement dans **Hamlet**.

```json
GET shakespeare/_search
{
  "query": {
    "bool": {
      "must": [
        {
          "multi_match": {
            "query": "love",
            "fields": ["text_entry", "speaker", "play_name"]
          }
        }
      ],
      "filter": [
        {
          "term": {
            "play_name.keyword": "Hamlet"
          }
        }
      ]
    }
  }
}
```

---

2. Chercher **"love"** dans `text_entry` et `play_name`, seulement dans la pièce **Hamlet**.
