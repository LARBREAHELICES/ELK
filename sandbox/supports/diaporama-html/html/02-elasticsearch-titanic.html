# Cours 2 - Elasticsearch avec Titanic
## Du CSV a l analyse metier explicable

---

## Objectif du chapitre

- Construire un index Titanic propre
- Inserer des donnees exemple reproductibles
- Executer des requetes metier et comprendre leur resultat
- Relier chaque requete a un repere theorique moteur

---

## Reperes theoriques (dataset tabulaire)

- Le mapping pilote la qualite des analyses
- Un champ numerique mal type casse `range`, `avg`, `histogram`
- Un champ categorie doit etre en `keyword` pour filtrer/agreger
- Elasticsearch est near-real-time: utiliser `_refresh` pour les demos

---

## Creer l index Titanic

```bash
curl -X PUT "http://localhost:9200/titanic_data" -H "Content-Type: application/json" -d '{
  "settings": {
    "number_of_shards": 1,
    "number_of_replicas": 0
  },
  "mappings": {
    "properties": {
      "survived":    { "type": "integer" },
      "pclass":      { "type": "integer" },
      "sex":         { "type": "keyword" },
      "age":         { "type": "float" },
      "fare":        { "type": "float" },
      "class":       { "type": "keyword" },
      "embark_town": { "type": "keyword" }
    }
  }
}'
```

Ce que fait le code:
- Cree un index dedie au dataset Titanic
- Verrouille les types pour garantir des resultats stables
- Prepare le terrain pour filtres et aggregations

---

## Inserer un mini echantillon de donnees

```bash
curl -X POST "http://localhost:9200/titanic_data/_bulk" -H "Content-Type: application/x-ndjson" -d '
{"index":{"_id":"1"}}
{"survived":0,"pclass":3,"sex":"male","age":22,"fare":7.25,"class":"Third","embark_town":"Southampton"}
{"index":{"_id":"2"}}
{"survived":1,"pclass":1,"sex":"female","age":38,"fare":71.2833,"class":"First","embark_town":"Cherbourg"}
{"index":{"_id":"3"}}
{"survived":1,"pclass":3,"sex":"female","age":26,"fare":7.925,"class":"Third","embark_town":"Southampton"}
{"index":{"_id":"4"}}
{"survived":1,"pclass":1,"sex":"female","age":35,"fare":53.1,"class":"First","embark_town":"Southampton"}
'

curl -X POST "http://localhost:9200/titanic_data/_refresh"
curl "http://localhost:9200/titanic_data/_count?pretty"
```

Ce que fait le code:
- Insere 4 passagers via `_bulk`
- Force la visibilite immediate via `_refresh`
- Verifie la quantite chargee

---

## Requete metier 1: profils cibles

```bash
curl -X GET "http://localhost:9200/titanic_data/_search?pretty" -H "Content-Type: application/json" -d '{
  "query": {
    "bool": {
      "filter": [
        { "term":  { "sex": "female" } },
        { "range": { "age": { "lte": 18 } } }
      ]
    }
  }
}'
```

Ce que fait le code:
- Filtre les passageres de 18 ans ou moins
- Utilise uniquement `filter` (pas de scoring)

Repere theorique:
- Les filtres exacts sont plus performants et cacheables

---

## Requete metier 2: combinaison de contraintes

```bash
curl -X GET "http://localhost:9200/titanic_data/_search?pretty" -H "Content-Type: application/json" -d '{
  "query": {
    "bool": {
      "filter": [
        { "term":  { "class": "First" } },
        { "range": { "fare": { "gte": 50 } } }
      ]
    }
  }
}'
```

Ce que fait le code:
- Isole les passagers de 1re classe avec billet >= 50
- Produit un sous-ensemble directement actionnable

---

## Aggregations metier Titanic

```bash
curl -X GET "http://localhost:9200/titanic_data/_search?pretty" -H "Content-Type: application/json" -d '{
  "size": 0,
  "aggs": {
    "survival_rate": { "avg": { "field": "survived" } },
    "by_sex": {
      "terms": { "field": "sex" },
      "aggs": {
        "survival_rate": { "avg": { "field": "survived" } }
      }
    },
    "by_class": {
      "terms": { "field": "class" },
      "aggs": {
        "avg_fare": { "avg": { "field": "fare" } }
      }
    }
  }
}'
```

Ce que fait le code:
- Calcule un taux de survie global
- Detaille ce taux par sexe
- Croise la classe avec le prix moyen du billet

Repere theorique:
- `avg(survived)` donne un taux car `survived` vaut 0 ou 1

---

## Controle qualite technique

```bash
curl "http://localhost:9200/_cat/indices?v"
curl "http://localhost:9200/titanic_data/_mapping?pretty"
curl "http://localhost:9200/titanic_data/_search?size=3&pretty"
```

Ce que fait le code:
- Controle l etat de l index
- Verifie les types reels du mapping
- Echantillonne des docs pour valider le format

---
