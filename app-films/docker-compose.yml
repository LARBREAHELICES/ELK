services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION:-8.10.2}
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "${ES_PORT:-19200}:9200"
      - "${ES_TRANSPORT_PORT:-19300}:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  kibana:
    image: docker.elastic.co/kibana/kibana:${ELASTIC_VERSION:-8.10.2}
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_SECURITY_ENABLED=false
    ports:
      - "${KIBANA_PORT:-15601}:5601"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5601/api/status >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  logstash:
    image: docker.elastic.co/logstash/logstash:${ELASTIC_VERSION:-8.10.2}
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    ports:
      - "${LOGSTASH_API_PORT:-19600}:9600"
    volumes:
      - ./logstash/pipeline/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ./data:/data:ro

  backend:
    build:
      context: ./backend
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_INDEX=${ELASTICSEARCH_INDEX:-tmdb-movies}
      - APP_CORS_ALLOW_ORIGINS=${APP_CORS_ALLOW_ORIGINS:-*}
    ports:
      - "${BACKEND_PORT:-18000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_BASE=/api
    ports:
      - "${FRONTEND_PORT:-15173}:5173"

volumes:
  es_data:
