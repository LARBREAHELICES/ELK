input {
  file {
    path => "/data/*TMDB*.csv"
    start_position => "beginning"
    sincedb_path => "/tmp/logstash_tmdb_movies.sincedb"
  }
}

filter {
  csv {
    separator => ","
    quote_char => '"'
    skip_header => true
    columns => ["index", "title", "original_language", "release_date", "popularity", "vote_average", "vote_count", "overview"]
  }

  mutate {
    rename => { "index" => "movie_id" }
    strip => ["title", "overview", "original_language", "release_date"]
    lowercase => ["original_language"]
    gsub => ["vote_count", "\\s+", ""]
    convert => {
      "movie_id" => "integer"
      "popularity" => "float"
      "vote_average" => "float"
      "vote_count" => "integer"
    }
  }

  if [title] == "" {
    drop { }
  }

  date {
    match => ["release_date", "dd-MM-yyyy", "yyyy-MM-dd", "M/d/yyyy", "MM/dd/yyyy"]
    target => "release_date_ts"
  }

  mutate {
    remove_field => ["message", "@version", "path", "host", "event"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "tmdb-movies"
    document_id => "%{movie_id}"
  }

  stdout {
    codec => rubydebug
  }
}
