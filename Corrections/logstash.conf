input {
  file {
    path => "/data/movies.csv"
    start_position => "beginning"
    mode => "read"
    sincedb_path => "/tmp/movies.sincedb"
    codec => plain { charset => "UTF-8" }
    file_completed_action => "log"
    file_completed_log_path => "/usr/share/logstash/logs/movies_completed.log"
  }
}

filter {
  # Conserver la ligne brute pour audit et débogage
  mutate {
    rename => { "message" => "raw_line" }
  }

  # Supprimer l'en-tête CSV
  if [raw_line] =~ /^id,title,genres,original_language,/ {
    drop { }
  }

  # Parsing robuste pour ce dataset:
  # - le fichier n'est pas strictement CSV quote-safe
  # - certaines lignes contiennent des virgules libres (NF variable)
  ruby {
    code => '
      line = event.get("raw_line")
      if line.nil? || line.empty?
        event.tag("_empty_line")
        return
      end

      parts = line.split(",")
      # Format attendu: 20 colonnes. On tolère >20 et on reconstruit.
      if parts.length < 20
        event.tag("_parse_failure_too_few_columns")
        event.set("_columns_count", parts.length)
        return
      end

      # 1) Extraction depuis la droite (colonnes les plus stables)
      # ... , production_companies,release_date,budget,revenue,runtime,status,tagline,
      # vote_average,vote_count,credits,keywords,poster_path,backdrop_path,recommendations
      recommendations = parts.pop || ""
      backdrop_path = parts.pop || ""
      poster_path = parts.pop || ""
      keywords = parts.pop || ""
      credits = parts.pop || ""
      vote_count = parts.pop || ""
      vote_average = parts.pop || ""
      tagline = parts.pop || ""
      status = parts.pop || ""
      runtime = parts.pop || ""
      revenue = parts.pop || ""
      budget = parts.pop || ""
      release_date = parts.pop || ""
      production_companies = parts.pop || ""
      popularity = parts.pop || ""

      # 2) Extraction depuis la gauche:
      # id, title, genres, original_language, overview
      id = parts.shift || ""

      # On détecte original_language (2 lettres) et on reconstruit title/overview
      lang_idx = nil
      parts.each_with_index do |v, i|
        next unless v =~ /^[a-z]{2}$/
        next if i == 0 || i >= parts.length - 1
        lang_idx = i
        break
      end

      if lang_idx.nil?
        event.tag("_parse_failure_language_not_found")
        event.set("_columns_count", parts.length + 16) # approximation informative
        event.set("id", id)
        event.set("popularity", popularity)
        event.set("production_companies", production_companies)
        event.set("release_date", release_date)
        return
      end

      title = parts[0...(lang_idx-1)].join(",").strip
      genres = parts[lang_idx-1].to_s.strip
      original_language = parts[lang_idx].to_s.strip
      overview = parts[(lang_idx+1)..-1].join(",").strip

      event.set("id", id)
      event.set("title", title)
      event.set("genres", genres)
      event.set("original_language", original_language)
      event.set("overview", overview)
      event.set("popularity", popularity)
      event.set("production_companies", production_companies)
      event.set("release_date", release_date)
      event.set("budget", budget)
      event.set("revenue", revenue)
      event.set("runtime", runtime)
      event.set("status", status)
      event.set("tagline", tagline)
      event.set("vote_average", vote_average)
      event.set("vote_count", vote_count)
      event.set("credits", credits)
      event.set("keywords", keywords)
      event.set("poster_path", poster_path)
      event.set("backdrop_path", backdrop_path)
      event.set("recommendations", recommendations)
    '
  }

  # Données minimales obligatoires
  if [id] == "" or [title] == "" {
    mutate { add_tag => ["_missing_required_fields"] }
  }

  # Nettoyage texte de base
  mutate {
    strip => [
      "id", "title", "genres", "original_language", "overview", "popularity",
      "production_companies", "release_date", "budget", "revenue", "runtime",
      "status", "tagline", "vote_average", "vote_count", "credits", "keywords",
      "poster_path", "backdrop_path", "recommendations"
    ]
    lowercase => ["original_language", "status"]
  }

  # Conversions de types
  mutate {
    convert => {
      "id" => "integer"
      "popularity" => "float"
      "budget" => "float"
      "revenue" => "float"
      "runtime" => "float"
      "vote_average" => "float"
      "vote_count" => "integer"
    }
  }

  # Date normalisée vers @timestamp
  date {
    match => ["release_date", "yyyy-MM-dd"]
    target => "@timestamp"
    tag_on_failure => ["_date_parse_failure"]
  }

  # Genres en tableau (safe), recommandations en tableau d'IDs (safe)
  ruby {
    code => '
      g = event.get("genres")
      if g.is_a?(String)
        arr = g.split(/\s*-\s*/).map(&:strip).reject(&:empty?).uniq
        event.set("genres", arr)
      end

      rec = event.get("recommendations")
      if rec.is_a?(String) && !rec.empty?
        ids = rec.split("-").map { |x| x.to_i }.select { |n| n > 0 }
        event.set("recommendations", ids)
      else
        event.set("recommendations", [])
      end
    '
  }

  # Champs dérivés utiles pour analytics
  ruby {
    code => '
      b = event.get("budget")
      r = event.get("revenue")
      if b.is_a?(Numeric) && r.is_a?(Numeric) && b > 0
        event.set("roi", ((r - b) / b.to_f).round(4))
      end

      va = event.get("vote_average")
      if va.is_a?(Numeric)
        clamped = [[va, 0.0].max, 10.0].min
        event.set("vote_average", clamped)
      end

      ts = event.get("@timestamp")
      if ts
        y = ts.time.year
        event.set("release_year", y)
        event.set("release_decade", (y / 10) * 10)
      end

      t = event.get("title")
      if t.is_a?(String)
        event.set("title_length", t.length)
      end

      tg = event.get("tagline")
      event.set("has_tagline", tg.is_a?(String) && !tg.strip.empty?)
    '
  }

  # Hygiène: retirer les champs purement bruts inutiles en index clean
  mutate {
    remove_field => ["path", "host", "@version"]
  }
}

output {
  # Index de rejet pour audit des lignes non conformes
  if "_parse_failure_too_few_columns" in [tags] or "_parse_failure_language_not_found" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "movies_rejects"
    }
  } else if "_missing_required_fields" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "movies_rejects"
    }
  } else {
    # Index principal propre
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "movies_clean"
      document_id => "%{id}"
    }
  }

  # Debug événement (désactivable en prod si besoin)
  stdout {
    codec => rubydebug
  }
}
